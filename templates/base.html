
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Todo{% endblock %} — Claude</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=12">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  {% block body %}{% endblock %}

  <!-- Confirm modal -->
  <div class="confirm-modal" id="confirmModal" aria-hidden="true">
    <div class="confirm-backdrop"></div>
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h3 class="confirm-title" id="confirmTitle">Are you sure?</h3>
      <p class="confirm-message" id="confirmMessage"></p>
      <div class="confirm-actions">
        <button type="button" class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <script src="{% static 'js/app.js' %}?v=12"></script>
</body>
</html>
